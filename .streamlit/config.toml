[theme]
primaryColor = "#4A90E2"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#E8F4F8"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "developer"

[logger]
level = "info"

[server]
maxUploadSize = 200
enableXsrfProtection = true
headless = true
port = 8501

[browser]
gatherUsageStats = false
serverAddress = "localhost"
